<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel Craft ERP</title>
  <style>
    /* Floating dock trigger follows the selected navigation layout. */
    .erp-topbar .dock-trigger {
      position: fixed !important;
      z-index: 39 !important;
      margin: 0 !important;
      box-shadow: 0 12px 34px rgba(0,0,0,.42) !important;
    }
    .layout-dock-left .erp-topbar,
    .layout-left-sidebar .erp-topbar {
      padding-left: 78px !important;
    }
    .layout-dock-right .erp-topbar,
    .layout-right-sidebar .erp-topbar {
      padding-right: 78px !important;
    }
    .layout-dock-left .erp-topbar .dock-trigger,
    .layout-left-sidebar .erp-topbar .dock-trigger {
      left: 18px !important;
      right: auto !important;
      top: 28px !important;
      bottom: auto !important;
      transform: none !important;
    }
    .layout-dock-right .erp-topbar .dock-trigger,
    .layout-right-sidebar .erp-topbar .dock-trigger {
      right: 18px !important;
      left: auto !important;
      top: 28px !important;
      bottom: auto !important;
      transform: none !important;
    }
    .layout-bottom-dock .erp-topbar .dock-trigger {
      left: 50% !important;
      right: auto !important;
      top: auto !important;
      bottom: 18px !important;
      transform: translateX(-50%) !important;
      border-radius: 999px !important;
    }
    .layout-command-center .erp-topbar .dock-trigger {
      left: 50% !important;
      right: auto !important;
      top: 28px !important;
      bottom: auto !important;
      transform: translateX(-50%) !important;
      border-radius: 999px !important;
    }
    .layout-top-rail .erp-topbar .dock-trigger {
      position: static !important;
      transform: none !important;
    }
    .portal-permission-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .permission-toggle {
      display: grid !important;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface-alt) 70%, transparent);
      padding: 12px;
      margin: 0 !important;
    }
    .permission-toggle input { width: auto !important; }
    .permission-toggle strong { display:block; color: var(--text); }
    .permission-toggle small { display:block; color: var(--muted); margin-top: 2px; }
    @media (max-width: 760px) {
      .portal-permission-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/App.jsx"></script>
</body>
</html>
